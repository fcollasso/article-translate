# traduzia.com.br — vhost do quark-nginx (VPS 187.77.195.108).
# Proxy para o backend no desktop do Felipe via Tailscale (100.98.187.95:8010).
#
# Instalação: copiar para /root/quark/nginx/conf.d/traduzia.conf e recarregar
# o quark-nginx. Requer o certificado já emitido (antes disso, usar o
# traduzia.http-only.conf ao lado, senão o nginx não sobe).

# HTTP: desafio ACME + redireciona para HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name traduzia.com.br www.traduzia.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS: proxy para o desktop via tailnet
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name traduzia.com.br www.traduzia.com.br;

  ssl_certificate /etc/letsencrypt/live/traduzia.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/traduzia.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # uploads de PDF — mesmo limite do backend
  client_max_body_size 200m;

  # o proxy LLM é interno do desktop — nunca exposto na internet
  location /llmproxy/ {
    return 403;
  }

  location / {
    proxy_pass http://100.98.187.95:8010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90;
    proxy_send_timeout 300;   # upload de 200 MB atravessando o tailnet
    proxy_redirect off;
  }
}
