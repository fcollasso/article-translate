# Config HTTP-only do traduzia.com.br para a PRIMEIRA subida, antes de
# emitir o certificado (o vhost HTTPS não sobe sem os arquivos do Let's
# Encrypt). Depois de rodar o certbot, substituir pelo traduzia.conf.
server {
  listen 80;
  listen [::]:80;
  server_name traduzia.com.br www.traduzia.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 503;
  }
}
